<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h1>Questões</h1>

    <a href="/cadastrar">Cadastrar nova questão</a>

    <hr>

    {% for q in questoes %}
        <div>
            <h3>{{ q.pergunta }}</h3>

            <ul>
                <li>{{ q.alt1 }}</li>
                <li>{{ q.alt2 }}</li>
                <li>{{ q.alt3 }}</li>
            </ul>

            <p><strong>Correta:</strong> {{ q.correta }}</p>

            <a href="/editar/{{ loop.index0 }}">Editar</a>
            <a href="/deletar/{{ loop.index0 }}">Deletar</a>
        </div>

        <hr>
    {% endfor %}

</body>
</html>
